title = "operate-middleware gitleaks config"

# Use the bundled gitleaks default ruleset. The 540-line copy this file
# replaced (deleted 2026-05) was an inlined copy of that default plus
# the per-repo allowlist below. Keeping just the allowlist means rule
# updates flow in from gitleaks itself instead of hand-vendored.
[extend]
useDefault = true

[allowlist]
description = "operate-middleware-specific false-positive allowlist"
regexTarget = "match"
regexes = [
    '''\b(0x)?[0-9a-fA-F]{40}\b''', # EVM addresses in tests / data fixtures
    '''\b(0x)?[0-9a-fA-F]{64}\b''', # 32-byte hashes (tx hashes, keccak digests) in fixtures
    '''bafybei[a-z2-7]{52}''',      # IPFS CIDv1 hashes in contract YAMLs
]
