[tox]
skip_missing_interpreters = true
isolated_build = True
; tox-uv: seed venvs with pip / setuptools / wheel. The aea / autonomy
; CLI imports `pip._internal` at runtime, so envs that run those tools
; need pip on the interpreter — uv_seed handles it for every env.
uv_seed = true

[testenv]
passenv = *

[testenv:bandit]
skipsdist = True
skip_install = True
deps =
    tomte[bandit]==0.7.0
commands =
    bandit -r operate -x */tests/*
    bandit -s B101 -r tests

[testenv:black]
skipsdist = True
skip_install = True
deps =
    tomte[black]==0.7.0
commands =
    black operate tests

[testenv:black-check]
skipsdist = True
skip_install = True
deps =
    tomte[black]==0.7.0
commands =
    black --check operate tests

[testenv:isort]
skipsdist = True
skip_install = True
deps =
    tomte[isort]==0.7.0
commands =
    isort operate/ tests/

[testenv:isort-check]
skipsdist = True
skip_install = True
deps =
    tomte[isort]==0.7.0
commands =
    isort --check-only --gitignore operate/ tests/

[testenv:flake8]
skipsdist = True
skip_install = True
deps =
    tomte[flake8]==0.7.0
    Flake8-pyproject>=1.2.3,<2
commands =
    flake8 operate tests

[testenv:mypy]
skipsdist = True
skip_install = True
deps =
    tomte[mypy]==0.7.0
    types-cryptography  # TODO backport to tomte repository
commands =
    mypy operate/ tests/ --disallow-untyped-defs --config-file tox.ini

[testenv:pylint]
whitelist_externals = /bin/sh
skipsdist = True
allowlist_externals = uv
commands_pre =
    uv sync --active --all-groups --frozen --inexact
deps =
    tomte[pylint]==0.7.0
commands =
    pylint operate -j 0

[testenv:safety]
skipsdist = True
skip_install = True
deps =
    tomte[safety]==0.7.0
    typer<0.17.0  # remove after this is fixed https://github.com/pyupio/safety/issues/784
    ; safety>=3 (pulled in by tomte 0.7.0) breaks when paired with
    ; httpx>=0.28: pyup_api_client references the removed
    ; httpx.NetworkError. Pin until tomte catches up.
    httpx<0.28
; safety 3.x auto-loads .safety-policy.yml from CWD and errors if
; missing, even when -i flags are passed on the CLI. Keep the ignored
; vulnerability IDs in the top-level .safety-policy.yml so they're
; easy to read / edit.
commands =
    safety check --policy-file .safety-policy.yml

[testenv:unit-tests]
allowlist_externals = uv
commands_pre =
    uv sync --active --all-groups --frozen --inexact
skip_install = True
deps =
    tomte[tests]==0.7.0
commands =
    pytest -p no:pytest_anchorpy -m "not integration" -v --durations=100 {posargs:tests/}

[testenv:unit-tests-coverage]
allowlist_externals = uv
commands_pre =
    uv sync --active --all-groups --frozen --inexact
skip_install = True
deps =
    tomte[tests]==0.7.0
commands =
    pytest -p no:pytest_anchorpy -m "not integration" -v --durations=100 --cov=operate --cov-report=xml --cov-report=term-missing --cov-fail-under=100 {posargs:tests/}

[testenv:integration-tests]
allowlist_externals = uv
commands_pre =
    uv sync --active --all-groups --frozen --inexact
skip_install = True
deps =
    tomte[tests]==0.7.0
    pytest-xdist==3.8.0
commands =
    pytest -p no:pytest_anchorpy -m "integration" -n {env:PYTEST_XDIST_WORKERS:auto} --dist {env:PYTEST_XDIST_DIST:worksteal} -v --durations=100 {posargs:tests/}

[mypy]
strict_optional = True
exclude = ^(operate/operate_types\.py|operate/ledger/profiles\.py|operate/ledger/__init__\.py|operate/wallet/master\.py|operate/services/protocol\.py|operate/services/manage\.py|operate/cli\.py)$

[mypy-operate.*]
follow_imports = skip

[mypy-requests.*]
ignore_missing_imports = True

