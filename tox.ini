[tox]
envlist = isort
skip_missing_interpreters = true
isolated_build = True
; tox-uv: seed venvs with pip / setuptools / wheel. The aea / autonomy
; CLI imports `pip._internal` at runtime, so envs that run those tools
; need pip on the interpreter — uv_seed handles it for every env.
uv_seed = true

[testenv]
passenv = *

[testenv:bandit]
skipsdist = True
skip_install = True
deps =
    tomte[bandit]==0.7.0
commands =
    bandit -r operate -x */tests/*
    bandit -s B101 -r tests

[testenv:black]
skipsdist = True
skip_install = True
deps =
    tomte[black]==0.7.0
commands =
    black operate tests --exclude operate/data

[testenv:black-check]
skipsdist = True
skip_install = True
deps =
    tomte[black]==0.7.0
commands =
    black --check operate tests --exclude operate/data

[testenv:isort]
skipsdist = True
skip_install = True
deps =
    tomte[isort]==0.7.0
commands =
    isort operate/ tests/ --profile black --skip operate/data

[testenv:isort-check]
skipsdist = True
skip_install = True
deps =
    tomte[isort]==0.7.0
commands =
    isort --check-only --profile black --gitignore operate/ tests/ --skip operate/data

[testenv:flake8]
skipsdist = True
skip_install = True
deps =
    tomte[flake8]==0.7.0
commands =
    flake8 operate tests

[testenv:mypy]
skipsdist = True
skip_install = True
deps =
    tomte[mypy]==0.7.0
    types-cryptography  # TODO backport to tomte repository
commands =
    mypy operate/ tests/ --disallow-untyped-defs --config-file tox.ini

[testenv:pylint]
whitelist_externals = /bin/sh
skipsdist = True
allowlist_externals = uv
commands_pre =
    uv sync --active --all-groups --frozen --inexact
deps =
    tomte[pylint]==0.7.0
commands =
    pylint operate -j 0 --rcfile=.pylintrc

[testenv:safety]
skipsdist = True
skip_install = True
deps =
    tomte[safety]==0.7.0
    typer<0.17.0  # remove after this is fixed https://github.com/pyupio/safety/issues/784
    ; safety>=3 (pulled in by tomte 0.7.0) breaks when paired with
    ; httpx>=0.28: pyup_api_client references the removed
    ; httpx.NetworkError. Pin until tomte catches up.
    httpx<0.28
; safety 3.x auto-loads .safety-policy.yml from CWD and errors if
; missing, even when -i flags are passed on the CLI. Keep the ignored
; vulnerability IDs in the top-level .safety-policy.yml so they're
; easy to read / edit.
commands =
    safety check --policy-file .safety-policy.yml

[testenv:vulture]
skipsdist = True
skip_install = True
deps =
    tomte[vulture]==0.7.0
commands =
    vulture operate/services scripts/whitelist.py

[testenv:darglint]
skipsdist = True
skip_install = True
deps =
    tomte[darglint]==0.7.0
commands =
    darglint operate tests


[testenv:check-copyright]
skipsdist = True
skip_install = True
deps =
commands =
    {toxinidir}/scripts/check_copyright.py --check

[testenv:fix-copyright]
skipsdist = True
skip_install = True
deps =
commands =
    {toxinidir}/scripts/check_copyright.py

[testenv:liccheck]
skipsdist = True
usedevelop = True
deps = tomte[liccheck,cli]==0.7.0
commands =
    tomte freeze-dependencies --output-path {envtmpdir}/requirements.txt
    liccheck -s tox.ini -r {envtmpdir}/requirements.txt -l PARANOID

[testenv:unit-tests]
allowlist_externals = uv
commands_pre =
    uv sync --active --all-groups --frozen --inexact
skip_install = True
deps =
    tomte[tests]==0.7.0
commands =
    pytest -p no:pytest_anchorpy -m "not integration" -v --durations=100 {posargs:tests/}

[testenv:unit-tests-coverage]
allowlist_externals = uv
commands_pre =
    uv sync --active --all-groups --frozen --inexact
skip_install = True
deps =
    tomte[tests]==0.7.0
commands =
    pytest -p no:pytest_anchorpy -m "not integration" -v --durations=100 --cov=operate --cov-report=xml --cov-report=term-missing --cov-fail-under=100 {posargs:tests/}

[testenv:integration-tests]
allowlist_externals = uv
commands_pre =
    uv sync --active --all-groups --frozen --inexact
skip_install = True
deps =
    tomte[tests]==0.7.0
    pytest-xdist==3.8.0
commands =
    pytest -p no:pytest_anchorpy -m "integration" -n {env:PYTEST_XDIST_WORKERS:auto} --dist {env:PYTEST_XDIST_DIST:worksteal} -v --durations=100 {posargs:tests/}

[testenv:all-tests]
deps =
    tomte[tests]==0.7.0
    httpx
    pytest-recording
commands =
    pytest -p no:pytest_anchorpy -v --durations=100 {posargs:tests/}

[darglint]
docstring_style=sphinx
strictness=short
ignore_regex=async_act
ignore=DAR401

[flake8]
paths=autonomy,packages,tests
exclude=.md,
    *_pb2.py,
    autonomy/__init__.py,
    custom_types.py,
    *_pb2_grpc.py,
    packages/valory/connections/http_client,
    packages/valory/connections/ledger,
    packages/valory/connections/p2p_libp2p_client,
    packages/valory/protocols/acn,
    packages/valory/protocols/contract_api,
    packages/valory/protocols/operate_http,
    packages/valory/protocols/ledger_api
    operate/data/
max-line-length = 88
select = B,C,D,E,F,I,W,PT
; I003 to avoid conflicts with isort
ignore = E203,E501,W503,D202,B014,D400,D401,DAR,B028,B017,I003
application-import-names = autonomy,packages,tests

[isort]
# for black compatibility
profile=black
multi_line_output=3
include_trailing_comma=True
force_grid_wrap=0
use_parentheses=True
ensure_newline_before_comments = True
line_length=88
# custom configurations
order_by_type=False
case_sensitive=True
lines_after_imports=-1
skip =
skip_glob =
known_first_party=operate
known_local_folder=tests
sections=FUTURE,STDLIB,THIRDPARTY,FIRSTPARTY,LOCALFOLDER

[mypy]
strict_optional = True
exclude = ^(operate/operate_types\.py|operate/ledger/profiles\.py|operate/ledger/__init__\.py|operate/wallet/master\.py|operate/services/protocol\.py|operate/services/manage\.py|operate/cli\.py)$

[mypy-operate.*]
follow_imports = skip

[mypy-typing_extentions.*]
ignore_missing_imports = True

