name: Release Flow

# Controls when the action will run.
on:
  release:
    types: [published]
  workflow_dispatch:  # TODO: Remove after testing

permissions:
  id-token: write

jobs:
  publish-pip-packages:
    name: Publish the package on PyPi
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.14"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@master
      - uses: actions/setup-python@v3
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          sudo apt-get update --fix-missing
          sudo apt-get autoremove
          sudo apt-get autoclean
          python -m pip install --upgrade pip poetry
          poetry install
          python --version

      - name: Build wheels and source tarball
        run: |
          echo Processing olas-operate-middleware
          poetry run python -m build

      - name: Publish olas-operate-middleware Framework to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip_existing: true
          packages_dir: dist/

      - name: Fetch tags
        run: git fetch --tags

      - name: Compute branches in this release
        id: branches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The previous release tag is the second-most-recent published
          # release. Querying gh (not local git) avoids edge cases where the
          # tag isn't reachable from the current branch's history.
          PREV_TAG=$(gh release list --limit 2 --json tagName --jq '.[1].tagName')
          python scripts/compute_next_version.py --prev-tag "$PREV_TAG" | tee /tmp/release.json
          if [ "$(jq -r '.branches | length' /tmp/release.json)" = "0" ]; then
            echo "No branches in this release; skipping FE dispatch."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          {
            echo "branches=$(jq -c '.branches' /tmp/release.json)"
            echo "version=${GITHUB_REF_NAME#v}"
          } >> "$GITHUB_OUTPUT"

      - name: Get App token
        if: steps.branches.outputs.skip != 'true'
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: valory-xyz
          repositories: olas-operate-app

      - name: Dispatch FE pin-bump workflow
        if: steps.branches.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ steps.branches.outputs.version }}
          BRANCHES: ${{ steps.branches.outputs.branches }}
        run: |
          jq -n \
            --arg version "$VERSION" \
            --argjson branches "$BRANCHES" \
            '{event_type: "mw-released", client_payload: {version: $version, branches: $branches}}' \
          | gh api repos/valory-xyz/olas-operate-app/dispatches --method POST --input -
