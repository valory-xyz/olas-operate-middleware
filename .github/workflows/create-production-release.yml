name: Create Production Release

on:
  repository_dispatch:
    types: [create-production-release]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: create-production-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install Poetry
        run: python -m pip install --upgrade pip poetry

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Compute next version
        id: compute
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/compute_next_version.py | tee /tmp/version.json
          {
            echo "next_version=$(jq -r .next_version /tmp/version.json)"
            echo "next_tag=$(jq -r .next_tag /tmp/version.json)"
            echo "bump_type=$(jq -r .bump_type /tmp/version.json)"
            echo "previous_tag=$(jq -r .previous_tag /tmp/version.json)"
          } >> "$GITHUB_OUTPUT"

      - name: Bump version in pyproject.toml
        run: |
          poetry version "${{ steps.compute.outputs.next_version }}"
          git diff pyproject.toml

      - name: Commit version bump and push to main
        run: |
          git add pyproject.toml
          git commit -m "fix: bump version to ${{ steps.compute.outputs.next_version }} in pyproject.toml"
          git push origin main

      - name: Create and push tag
        run: |
          git tag "${{ steps.compute.outputs.next_tag }}"
          git push origin "${{ steps.compute.outputs.next_tag }}"

      - name: Get App token
        # Used so the release event has an external actor — releases created
        # by the default GITHUB_TOKEN do not trigger downstream workflows
        # (release.yml will not fire), per GitHub's anti-loop guard.
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh release create "${{ steps.compute.outputs.next_tag }}" \
            --title "${{ steps.compute.outputs.next_tag }}" \
            --notes "Bump type: **${{ steps.compute.outputs.bump_type }}** (previous: ${{ steps.compute.outputs.previous_tag }})" \
            --generate-notes
