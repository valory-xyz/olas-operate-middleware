name: "Common Checks"
on:
  push:
    branches:
      - main
      - staging
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  linter_checks:
    continue-on-error: False
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.14"]
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    - uses: snok/install-poetry@v1
      with:
        version: "2.3.2"
    - name: Install dependencies
      run:  |
        sudo apt-get update --fix-missing
        sudo apt-get autoremove
        sudo apt-get autoclean
        pip install tomte[tox]==0.6.1
        pip install --user --upgrade setuptools
        sudo npm install -g markdown-spellcheck
    - name: All pre-test checks
      run: |
        tox -p -e flake8 -e pylint; poetry run tox -p -e black-check -e isort-check -e bandit -e safety -e mypy

  unit-tests:
    continue-on-error: False
    needs:
      - linter_checks
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        include:
          - os: macos-latest
            python-version: "3.10"
          - os: macos-latest
            python-version: "3.14"
          - os: windows-latest
            python-version: "3.10"
          - os: windows-latest
            python-version: "3.14"

    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - uses: snok/install-poetry@v1
        with:
          version: "2.3.2"

      - name: Run unit tests
        env:
          POETRY_EXE: ${{ runner.os == 'Windows' && 'C:\\Users\\runneradmin\\.local\\bin\\poetry.exe' || 'poetry' }}
        run: |
          pip install tomte[tox]==0.6.1
          tox -e unit-tests

  coverage:
    continue-on-error: False
    needs:
      - linter_checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.14"
      - uses: snok/install-poetry@v1
        with:
          version: "2.3.2"

      - name: Run unit tests with coverage
        env:
          POETRY_EXE: ${{ runner.os == 'Windows' && 'C:\\Users\\runneradmin\\.local\\bin\\poetry.exe' || 'poetry' }}
        run: |
          pip install tomte[tox]==0.6.1
          tox -e unit-tests-coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  integration-tests:
    continue-on-error: False
    needs:
      - linter_checks
      - unit-tests
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
        python-version: [ "3.14" ]

    timeout-minutes: 90

    env:
      BASE_RPC: ${{ secrets.BASE_RPC }}
      ETHEREUM_RPC: ${{ secrets.ETHEREUM_RPC }}
      GNOSIS_RPC: ${{ secrets.GNOSIS_RPC }}
      MODE_RPC: ${{ secrets.MODE_RPC }}
      OPTIMISM_RPC: ${{ secrets.OPTIMISM_RPC }}
      BASE_TESTNET_RPC: ${{ secrets.BASE_TESTNET_RPC }}
      ETHEREUM_TESTNET_RPC: ${{ secrets.ETHEREUM_TESTNET_RPC }}
      GNOSIS_TESTNET_RPC: ${{ secrets.GNOSIS_TESTNET_RPC }}
      MODE_TESTNET_RPC: ${{ secrets.MODE_TESTNET_RPC }}
      OPTIMISM_TESTNET_RPC: ${{ secrets.OPTIMISM_TESTNET_RPC }}
      POLYGON_TESTNET_RPC: ${{ secrets.POLYGON_TESTNET_RPC }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - uses: snok/install-poetry@v1
        with:
          version: "2.3.2"

      - name: Run integration tests
        env:
          POETRY_EXE: ${{ runner.os == 'Windows' && 'C:\\Users\\runneradmin\\.local\\bin\\poetry.exe' || 'poetry' }}
          PYTEST_XDIST_WORKERS: "8"
        run: |
          pip install tomte[tox]==0.6.1
          tox -e integration-tests
