# Safety policy file (safety 2.x format).
#
# safety 3.x began requiring this file to exist even when ignore IDs are
# supplied via CLI `-i` flags, so keep the ignored vulnerability IDs here
# alongside their reasons rather than scattered across the tox invocation.
